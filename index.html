<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SkyRise V2</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
<div id="bg"></div>
<div class="mouse-glow"></div>

<nav>
  <div class="logo">SKYRISE</div>
  <div class="links">
    <a href="#">Home</a>
    <a href="#">Store</a>
    <a href="#">Discord</a>
  </div>
</nav>

<section class="hero">
  <div class="hero-content">
    <h1>SKYRISE</h1>
    <p>Rise Above The Competition • Minecraft Bedwars 1.8.9</p>
    <div class="buttons">
      <button>Play Now</button>
      <button class="secondary">Open Store</button>
    </div>
  </div>

  <div class="hero-island">
    <img src="images/bedwars-island.png" alt="BedWars Island">
</div>
</section>

<section class="stats">
  <div class="card"><h2>1284</h2><span>Players Online</span></div>
  <div class="card"><h2>1250000+</h2><span>Games Played</span></div>
  <div class="card"><h2>450000+</h2><span>Beds Broken</span></div>
  <div class="card"><h2>12000+</h2><span>Discord Members</span></div>
</section>

<script src="script.js"></script>
</body>
</html>
